name: Debug BigQuery Auth
on: workflow_dispatch
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install --global yarn
      - run: yarn install
      - name: Test BigQuery
        run: node -e "
          const { BigQuery } = require('@google-cloud/bigquery');
          const key = JSON.parse(
            Buffer.from(process.env.GOOGLE_SERVICE_KEY, 'base64').toString().replace(/\n/g, '')
          );
          console.log('Project:', key.project_id);
          console.log('Email:', key.client_email);
          const client = new BigQuery({
            projectId: key.project_id,
            credentials: {
              client_email: key.client_email,
              private_key: key.private_key,
            },
          });
          client.query('SELECT 1 as test').then(([rows]) => {
            console.log('BigQuery OK:', JSON.stringify(rows));
          }).catch(e => {
            console.log('BigQuery ERROR:', e.message);
            process.exit(1);
          });
        "
        env:
          GOOGLE_SERVICE_KEY: \${{ secrets.GOOGLE_SERVICE_KEY }}
