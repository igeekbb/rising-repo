name: Update BigQuery Data

on:
  workflow_dispatch:
  schedule:
    - cron: '30 15 * * *'  # 30 min before deploy

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          npm install --global yarn
          yarn install

      - name: Fetch fresh data from BigQuery
        id: fetch
        run: node scripts/fetch-data.js
        env:
          GOOGLE_SERVICE_KEY: ${{ secrets.GOOGLE_SERVICE_KEY }}
          MY_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        continue-on-error: true

      - name: Commit and push if data changed
        if: success() && steps.fetch.outcome == 'success'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add db.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "data: auto-update from BigQuery [skip ci]"
            git push
          fi
